<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>給思思的一份小驚喜 ✨</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            width:100%;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #ffd6e7, #ffeef5, #fff7fb);
            overflow:hidden;
            font-family: 'Noto Serif TC', serif;
        }

        .container{
            text-align:center;
            background: rgba(255,255,255,0.35);
            backdrop-filter: blur(10px);
            padding:50px 35px;
            border-radius:30px;
            box-shadow: 0 10px 35px rgba(255, 170, 200, 0.35);
            animation: fadeIn 1.5s ease;
        }

        .flower{
            font-size:70px;
            animation: float 3s ease-in-out infinite;
        }

        h1{
            color:#ff5c93;
            margin-top:15px;
            font-size:32px;
        }

        p{
            color:#666;
            margin-top:15px;
            font-size:16px;
            line-height:1.8;
        }

        .button{
            display:inline-block;
            margin-top:30px;
            padding:14px 32px;
            border-radius:50px;
            text-decoration:none;
            background:#ff7aa8;
            color:white;
            font-size:18px;
            transition:0.3s;
            box-shadow:0 5px 15px rgba(255,122,168,0.4);
        }

        .button:hover{
            transform:scale(1.08);
            background:#ff5c93;
        }

        @keyframes float{
            0%{
                transform:translateY(0px);
            }
            50%{
                transform:translateY(-10px);
            }
            100%{
                transform:translateY(0px);
            }
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .sparkle{
            position:absolute;
            font-size:20px;
            animation:sparkle 4s linear infinite;
            opacity:0.7;
        }

        @keyframes sparkle{
            0%{
                transform:translateY(100vh) scale(0.5);
                opacity:0;
            }
            30%{
                opacity:1;
            }
            100%{
                transform:translateY(-20vh) scale(1.2);
                opacity:0;
            }
        }
    </style>
</head>

<body>

    <!-- efek bunga -->
    <div class="sparkle" style="left:10%; animation-delay:0s;">🌸</div>
    <div class="sparkle" style="left:25%; animation-delay:1s;">✨</div>
    <div class="sparkle" style="left:45%; animation-delay:2s;">🌸</div>
    <div class="sparkle" style="left:65%; animation-delay:0.5s;">💖</div>
    <div class="sparkle" style="left:80%; animation-delay:1.5s;">🌷</div>

    <div class="container">
        <div class="flower">🌸</div>

        <h1>給思思的小花花</h1>

        <p>
            我做了一個小小的東西送給妳。<br>
            希望妳打開的時候，會偷偷笑一下 ✨
        </p>

        <a href="content2.html" class="button">
            點這裡看看吧 ♡
        </a>
    </div>

</body>
</html>
